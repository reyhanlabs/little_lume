<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | LittleLume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #2C3E7A;
        --secondary: #7C5CBF;
        --success: #10B981;
        --danger: #EF4444;
        --bg-light: #F8F9FD;
        --bg-card: #FFFFFF;
        --text-primary: #1A202C;
        --text-secondary: #64748B;
        --border: #E2E8F0;
        --shadow-lg: 0 12px 24px rgba(0,0,0,0.12);
        --shadow-xl: 0 20px 40px rgba(0,0,0,0.15);
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #F8F9FD 0%, #F0EEFA 100%);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
    }
    h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }

    .auth-card {
        background: var(--bg-card);
        border-radius: 24px;
        box-shadow: var(--shadow-xl);
        padding: 2.6rem 2.2rem;
        width: 100%;
        max-width: 420px;
    }
    .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-bottom: 1.6rem;
    }
    .brand-badge {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        width: 38px; height: 38px;
        border-radius: 11px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.15rem;
    }
    .brand-name {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--primary);
    }

    h1.title { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 0.4rem; }
    p.subtitle { text-align: center; color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 1.8rem; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 700; margin-bottom: 0.4rem; color: var(--text-primary); }
    .field input {
        width: 100%;
        padding: 0.75rem 0.95rem;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        transition: var(--transition);
        background: var(--bg-light);
    }
    .field input:focus { outline: none; border-color: var(--secondary); background: white; }

    .field-row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
    .field-row-between label { margin-bottom: 0; }
    .forgot-link { font-size: 0.78rem; color: var(--secondary); text-decoration: none; font-weight: 600; background: none; border: none; cursor: pointer; padding: 0; font-family: 'Inter', sans-serif; }
    .forgot-link:hover { text-decoration: underline; }

    .btn-primary {
        width: 100%;
        border: none;
        background: var(--primary);
        color: white;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        padding: 0.85rem;
        border-radius: 14px;
        cursor: pointer;
        font-size: 0.98rem;
        transition: var(--transition);
        margin-top: 0.3rem;
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) { background: var(--secondary); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-primary:disabled { opacity: 0.65; cursor: default; }

    .divider { display: flex; align-items: center; gap: 0.8rem; margin: 1.4rem 0; color: var(--text-secondary); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .btn-google {
        width: 100%;
        border: 2px solid var(--border);
        background: white;
        color: var(--text-primary);
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        padding: 0.8rem;
        border-radius: 14px;
        cursor: pointer;
        font-size: 0.92rem;
        transition: var(--transition);
        display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .btn-google:hover:not(:disabled) { border-color: var(--secondary); background: var(--bg-light); }
    .btn-google:disabled { opacity: 0.65; cursor: default; }
    .google-icon { width: 18px; height: 18px; }

    .switch-link { text-align: center; margin-top: 1.6rem; font-size: 0.9rem; color: var(--text-secondary); }
    .switch-link a { color: var(--secondary); font-weight: 700; text-decoration: none; }
    .switch-link a:hover { text-decoration: underline; }

    .alert {
        display: none;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #B91C1C;
        font-size: 0.85rem;
        font-weight: 600;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        margin-bottom: 1.2rem;
    }
    .alert.show { display: block; }
    .alert.success {
        background: rgba(16, 185, 129, 0.08);
        border-color: rgba(16, 185, 129, 0.25);
        color: #067A55;
    }

    .spinner {
        width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
    }
    .btn-primary.loading .spinner { display: inline-block; }
    .btn-primary.loading .btn-label { opacity: 0.85; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-home { display: block; text-align: center; margin-top: 1.4rem; font-size: 0.82rem; color: var(--text-secondary); text-decoration: none; }
    .back-home:hover { color: var(--primary); }
</style>
</head>
<body>

<div class="auth-card">
    <div class="brand">
        <span class="brand-badge">✨</span>
        <span class="brand-name">LittleLume</span>
    </div>
    <h1 class="title">Welcome back!</h1>
    <p class="subtitle">Login untuk lanjut belajar bareng LittleLume</p>

    <div class="alert" id="alertBox"></div>

    <form id="loginForm">
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email">
        </div>
        <div class="field">
            <div class="field-row-between">
                <label for="password">Password</label>
                <button type="button" class="forgot-link" id="forgotBtn">Lupa password?</button>
            </div>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
            <span class="spinner"></span>
            <span class="btn-label">Login</span>
        </button>
    </form>

    <div class="divider">atau</div>

    <button class="btn-google" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.1 5.5 29.3 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5 44.5 35.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.1 5.5 29.3 3.5 24 3.5c-7.6 0-14.1 4.3-17.4 10.6z"/>
            <path fill="#4CAF50" d="M24 44.5c5.2 0 9.9-1.8 13.5-4.9l-6.2-5.2c-2 1.4-4.6 2.3-7.3 2.3-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.8 40.1 16.4 44.5 24 44.5z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.2 5.2C40.9 35.6 44.5 30.3 44.5 24c0-1.2-.1-2.4-.3-3.5z"/>
        </svg>
        <span class="btn-label">Continue with Google</span>
    </button>

    <p class="switch-link">Belum punya akun? <a href="signup.html">Daftar di sini</a></p>
    <a class="back-home" href="index.html">← Kembali ke Home</a>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
    var alertBox = document.getElementById('alertBox');
    var loginForm = document.getElementById('loginForm');
    var loginBtn = document.getElementById('loginBtn');
    var googleBtn = document.getElementById('googleBtn');
    var forgotBtn = document.getElementById('forgotBtn');

    function showAlert(msg, type) {
        alertBox.textContent = msg;
        alertBox.className = 'alert show' + (type === 'success' ? ' success' : '');
    }
    function hideAlert() {
        alertBox.className = 'alert';
    }
    function setLoading(btn, isLoading) {
        btn.disabled = isLoading;
        btn.classList.toggle('loading', isLoading);
    }
    function getRedirectTarget() {
        var params = new URLSearchParams(window.location.search);
        return params.get('redirect') || 'index.html';
    }
    function friendlyError(error) {
        var map = {
            'auth/invalid-email': 'Format email tidak valid.',
            'auth/user-disabled': 'Akun ini telah dinonaktifkan.',
            'auth/user-not-found': 'Email belum terdaftar. Silakan daftar dulu.',
            'auth/wrong-password': 'Password salah. Coba lagi.',
            'auth/invalid-credential': 'Email atau password salah.',
            'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi beberapa saat lagi.',
            'auth/popup-closed-by-user': 'Login dibatalkan.',
            'auth/network-request-failed': 'Koneksi bermasalah. Cek internet kamu.'
        };
        return map[error.code] || ('Terjadi kesalahan: ' + error.message);
    }

    loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        hideAlert();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        setLoading(loginBtn, true);
        firebase.auth().signInWithEmailAndPassword(email, password)
            .then(function () {
                window.location.href = getRedirectTarget();
            })
            .catch(function (error) {
                showAlert(friendlyError(error));
                setLoading(loginBtn, false);
            });
    });

    googleBtn.addEventListener('click', function () {
        hideAlert();
        setLoading(googleBtn, true);
        var provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider)
            .then(function () {
                window.location.href = getRedirectTarget();
            })
            .catch(function (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showAlert(friendlyError(error));
                }
                setLoading(googleBtn, false);
            });
    });

    forgotBtn.addEventListener('click', function () {
        hideAlert();
        var email = document.getElementById('email').value.trim();
        if (!email) {
            showAlert('Isi dulu email kamu di atas, baru klik "Lupa password?".');
            return;
        }
        firebase.auth().sendPasswordResetEmail(email)
            .then(function () {
                showAlert('Link reset password sudah dikirim ke ' + email + '. Cek inbox kamu.', 'success');
            })
            .catch(function (error) {
                showAlert(friendlyError(error));
            });
    });

    // If already logged in, skip straight to the destination
    firebase.auth().onAuthStateChanged(function (user) {
        if (user) {
            window.location.href = getRedirectTarget();
        }
    });
</script>
</body>
</html>
