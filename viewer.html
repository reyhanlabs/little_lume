<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worksheet Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2C3E7A;
            --secondary: #7C5CBF;
            --accent: #00D9FF;
            --bg-light: #F8F9FD;
            --bg-card: #FFFFFF;
            --text-primary: #1A202C;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8F9FD 0%, #F5F7FC 100%);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-md);
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .back-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--primary);
        }

        .toolbar-right {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .action-btn.secondary {
            background: var(--bg-card);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .action-btn.secondary:hover {
            background: var(--primary);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem 2rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .error {
            background: #FEE2E2;
            border: 1px solid #FCA5A5;
            color: #991B1B;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            margin: 2rem 0;
        }

        .worksheet {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }

        .worksheet-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }

        .worksheet-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .worksheet-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .worksheet-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: linear-gradient(135deg, rgba(44, 62, 122, 0.05) 0%, rgba(0, 217, 255, 0.05) 100%);
            border-radius: 8px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .questions-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 2rem 0 1.5rem;
            color: var(--primary);
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--accent);
        }

        .question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg-light);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .question-num {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .question-text {
            margin-bottom: 0.75rem;
            font-weight: 500;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .option {
            padding: 0.75rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
        }

        .fitb-question {
            padding: 0.5rem 0;
            line-height: 2.5;
        }

        .blank {
            display: inline-block;
            width: 150px;
            border-bottom: 2px solid var(--text-primary);
            margin: 0 4px;
        }

        .essay-prompt {
            padding: 1rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(0, 217, 255, 0.1) 100%);
            border-radius: 8px;
            margin-bottom: 2rem;
            min-height: 150px;
        }

        /* Print Styles */
        @media print {
            .toolbar {
                display: none;
            }

            .container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }

            .worksheet {
                page-break-inside: avoid;
                box-shadow: none;
                border: none;
                padding: 0;
            }

            .question {
                page-break-inside: avoid;
            }

            body {
                background: white;
            }
        }

        @media (max-width: 768px) {
            .toolbar {
                padding: 1rem;
            }

            .toolbar-left,
            .toolbar-right {
                flex-direction: column;
                width: 100%;
            }

            .back-btn,
            .action-btn {
                width: 100%;
                text-align: center;
            }

            .worksheet {
                padding: 1.5rem;
            }

            .worksheet-header h1 {
                font-size: 1.3rem;
            }

            .options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-left">
            <a href="index.html" class="back-btn">← Back</a>
            <div class="title" id="toolbarTitle">Loading...</div>
        </div>
        <div class="toolbar-right">
            <button class="action-btn secondary" onclick="window.print()">🖨️ Print</button>
            <button class="action-btn" onclick="downloadHTML()">💾 Download</button>
        </div>
    </div>

    <div class="container">
        <div class="loading" id="loading">📋 Loading worksheet...</div>
        <div id="worksheetContainer"></div>
    </div>

    <script>
        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade');
        const skill = params.get('skill');
        const chapter = params.get('chapter');
        const questionCount = parseInt(params.get('count')) || 10;
        const difficulty = params.get('difficulty') || 'mixed';
        const questionType = params.get('type') || 'mixed';

        async function loadWorksheet() {
            try {
                // Load grade data
                const response = await fetch(`bank/grade${grade}.json`);
                if (!response.ok) throw new Error('Failed to load worksheet data');
                const gradeData = await response.json();

                // Find chapter
                const chapterData = gradeData.chapters.find(ch => ch.chapter === parseInt(chapter));
                if (!chapterData) throw new Error('Chapter not found');

                // Get skill data
                const skillData = chapterData[skill];
                if (!skillData) throw new Error('Skill data not found');

                // Combine all questions
                let allQuestions = [];
                if (skillData.partA) allQuestions = allQuestions.concat(skillData.partA);
                if (skillData.partB) allQuestions = allQuestions.concat(skillData.partB);

                // Filter by difficulty
                if (difficulty !== 'mixed') {
                    allQuestions = allQuestions.filter(q => q.difficulty === difficulty || !q.difficulty);
                }

                // Filter by type
                if (questionType !== 'mixed') {
                    if (questionType === 'mc') {
                        allQuestions = allQuestions.filter(q => q.options);
                    } else if (questionType === 'fitb') {
                        allQuestions = allQuestions.filter(q => !q.options);
                    }
                }

                // Limit to requested count
                const questions = allQuestions.slice(0, questionCount);

                // Generate HTML
                renderWorksheet(grade, skill, chapter, chapterData, questions);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('worksheetContainer').innerHTML = `
                    <div class="error">
                        <h2>❌ Error Loading Worksheet</h2>
                        <p>${error.message}</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">Please go back and try again.</p>
                    </div>
                `;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderWorksheet(grade, skill, chapter, chapterData, questions) {
            const skillNames = {
                'listening': '🎧 Listening',
                'reading': '📖 Reading',
                'writing': '✍️ Writing',
                'speaking': '🗣️ Speaking'
            };

            let html = `
                <div class="worksheet">
                    <div class="worksheet-header">
                        <h1>📋 English Worksheet</h1>
                        <p>Grade ${grade} - ${chapterData.title}</p>
                    </div>

                    <div class="worksheet-info">
                        <div class="info-item">
                            <div class="info-label">Grade</div>
                            <div class="info-value">Grade ${grade}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Skill</div>
                            <div class="info-value">${skillNames[skill]}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Chapter</div>
                            <div class="info-value">Chapter ${chapter}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Questions</div>
                            <div class="info-value">${questions.length}</div>
                        </div>
                    </div>

                    <div class="questions-section">
                        <h2 class="section-title">Answer the following questions:</h2>
            `;

            questions.forEach((q, idx) => {
                if (q.options) {
                    // Multiple Choice
                    html += `
                        <div class="question">
                            <div class="question-num">Question ${idx + 1}</div>
                            <div class="question-text">${q.question}</div>
                            <div class="options">
                                <div class="option">A) ${q.options[0]}</div>
                                <div class="option">B) ${q.options[1]}</div>
                                <div class="option">C) ${q.options[2]}</div>
                                <div class="option">D) ${q.options[3]}</div>
                            </div>
                            <div style="padding: 1rem; text-align: center; border-top: 1px dashed var(--border); margin-top: 1rem;">
                                Answer: ______
                            </div>
                        </div>
                    `;
                } else {
                    // Fill in the Blank
                    html += `
                        <div class="question">
                            <div class="question-num">Question ${idx + 1}</div>
                            <div class="fitb-question">${q.question}</div>
                            <div style="height: 40px;"></div>
                        </div>
                    `;
                }
            });

            html += `
                    </div>
                </div>
            `;

            document.getElementById('worksheetContainer').innerHTML = html;
            document.getElementById('toolbarTitle').textContent = `Grade ${grade} - ${skillNames[skill]} - Chapter ${chapter}`;
        }

        function downloadHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `worksheet-grade${grade}-${skill}-chapter${chapter}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Load worksheet on page load
        loadWorksheet();
    </script>
</body>
</html>
