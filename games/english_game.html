// 15. ABC ORDER
// ═══════════════════════════════════════════════════════════
function ABCOrder({ age, onBack }) {
  const allWords = getAllWords(age);
  const count = age === "5-6" ? 4 : age === "7-8" ? 5 : 6;
  const [words, setWords] = useState([]);
  const [sorted, setSorted] = useState([]);
  const [placed, setPlaced] = useState([]);
  const [pool, setPool] = useState([]);
  const [feedback, setFeedback] = useState("");
  const [score, setScore] = useState(0);

  const newRound = useCallback(() => {
    const chosen = pick(allWords, count);
    const s = [...chosen].sort();
    setWords(chosen);
    setSorted(s);
    setPlaced([]);
    setPool(shuffle(chosen).map((w, i) => ({ word: w, id: i, used: false })));
    setFeedback("");
  }, [allWords, count]);

  useEffect(() => { newRound(); }, []);

  const addWord = (item) => {
    if (item.used || feedback) return;
    const np = pool.map(p => p.id === item.id ? { ...p, used: true } : p);
    const newPlaced = [...placed, item.word];
    setPool(np);
    setPlaced(newPlaced);
    if (newPlaced.length === sorted.length) {
      const isCorrect = newPlaced.every((w, i) => w === sorted[i]);
      if (isCorrect) {
        setFeedback("correct");
        setScore(s => s + 1);
        confetti(20);
      } else {
        setFeedback("wrong");
      }
    }
  };

  const removeWord = (idx) => {
    if (feedback) return;
    const w = placed[idx];
    setPlaced(placed.filter((_, i) => i !== idx));
    setPool(pool.map(p => p.word === w && p.used ? { ...p, used: false } : p));
  };

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {score}</div>
      </div>
      <h2 className="game-title">🔤 ABC Order</h2>
      <p className="game-instruction">Put the words in alphabetical order!</p>
      <div className="abc-slots">
        {sorted.map((_, i) => (
          <div key={i} className={`abc-slot ${placed[i] ? "filled" : ""} ${feedback === "correct" ? "abc-correct" : ""} ${feedback === "wrong" ? "abc-wrong" : ""}`}
            onClick={() => placed[i] && removeWord(i)}>
            <span className="abc-slot-num">{i + 1}</span>
            {placed[i] || ""}
          </div>
        ))}
      </div>
      <div className="abc-word-pool">
        {pool.map(item => (
          <button key={item.id} className={`abc-word-btn ${item.used ? "used" : ""}`} onClick={() => addWord(item)} disabled={item.used}>
            {item.word}
          </button>
        ))}
      </div>
      {feedback === "wrong" && <button className="retry-btn" onClick={newRound}>🔄 Try Again</button>}
      {feedback === "correct" && <button className="next-btn" onClick={newRound}>Next →</button>}
      {!feedback && <button className="skip-btn" onClick={newRound}>Skip →</button>}
    </div>
  );
}

// 16. WORD BUILDER
// ═══════════════════════════════════════════════════════════
function WordBuilder({ age, onBack }) {
  const allWords = getAllWords(age);
  const minLen = age === "5-6" ? 2 : 3;
  const [letters, setLetters] = useState([]);
  const [building, setBuilding] = useState([]);
  const [foundWords, setFoundWords] = useState([]);
  const [feedback, setFeedback] = useState("");
  const [timeLeft, setTimeLeft] = useState(60);
  const [gameOver, setGameOver] = useState(false);
  const timerRef = useRef();

  const validWords = useRef(new Set());

  const initGame = useCallback(() => {
    // Pick a long word and use its letters
    const longWords = allWords.filter(w => w.length >= 5);
    const base = pick(longWords)[0] || pick(allWords)[0];
    const letterArr = shuffle(base.split("")).map((l, i) => ({ letter: l, id: i, used: false }));
    setLetters(letterArr);
    setBuilding([]);
    setFoundWords([]);
    setFeedback("");
    setTimeLeft(60);
    setGameOver(false);
    // Precompute valid words from these letters
    const available = base.split("");
    const valid = new Set();
    for (const w of allWords) {
      if (w.length < minLen) continue;
      const temp = [...available];
      let canMake = true;
      for (const ch of w) {
        const idx = temp.indexOf(ch);
        if (idx === -1) { canMake = false; break; }
        temp.splice(idx, 1);
      }
      if (canMake) valid.add(w);
    }
    validWords.current = valid;
  }, [allWords, minLen]);

  useEffect(() => { initGame(); }, []);

  useEffect(() => {
    if (gameOver) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(timerRef.current); setGameOver(true); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [gameOver, letters]);

  const selectLetter = (item) => {
    if (item.used || gameOver) return;
    setLetters(letters.map(l => l.id === item.id ? { ...l, used: true } : l));
    setBuilding([...building, item]);
    setFeedback("");
  };

  const clearBuilding = () => {
    setLetters(letters.map(l => ({ ...l, used: false })));
    setBuilding([]);
    setFeedback("");
  };

  const submitWord = () => {
    const word = building.map(b => b.letter).join("");
    if (word.length < minLen) {
      setFeedback("Too short!");
      return;
    }
    if (foundWords.includes(word)) {
      setFeedback("Already found!");
      return;
    }
    if (validWords.current.has(word)) {
      setFoundWords([...foundWords, word]);
      setFeedback("correct");
      confetti(8);
    } else {
      setFeedback("Not a word!");
    }
    setTimeout(() => {
      clearBuilding();
    }, 500);
  };

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {foundWords.length}</div>
      </div>
      <h2 className="game-title">🧩 Word Builder</h2>
      <p className="game-instruction">Build as many words as you can from these letters!</p>
      {!gameOver ? (
        <React.Fragment>
          <div className="wb-timer">⏱️ {timeLeft}s | Possible: {validWords.current.size}</div>
          <div className="wb-letters">
            {letters.map(item => (
              <button key={item.id} className={`wb-letter ${item.used ? "used" : ""}`} onClick={() => selectLetter(item)} disabled={item.used}>
                {item.letter}
              </button>
            ))}
          </div>
          <div className="wb-current">
            <div className="wb-building">{building.map(b => b.letter).join("") || "..."}</div>
          </div>
          <div className="wb-actions">
            <button className="wb-action-btn" onClick={clearBuilding}>Clear</button>
            <button className="wb-action-btn wb-submit" onClick={submitWord}>Submit ✓</button>
          </div>
          {feedback && feedback !== "correct" && <p style={{textAlign:"center",color:"#ef4444",fontFamily:"'Fredoka',sans-serif"}}>{feedback}</p>}
          {feedback === "correct" && <p style={{textAlign:"center",color:"var(--green)",fontFamily:"'Fredoka',sans-serif"}}>✅ Nice!</p>}
          {foundWords.length > 0 && (
            <div className="wb-found-list">
              {foundWords.map(w => <span key={w} className="wb-found-word">{w}</span>)}
            </div>
          )}
        </React.Fragment>
      ) : (
        <div style={{textAlign:"center"}}>
          <div className="win-card" style={{display:"inline-block",marginTop:20}}>
            <div className="win-emoji">🧩</div>
            <h3>Time's Up!</h3>
            <p>You found {foundWords.length} out of {validWords.current.size} words!</p>
            {foundWords.length > 0 && <div className="wb-found-list" style={{marginTop:12}}>{foundWords.map(w => <span key={w} className="wb-found-word">{w}</span>)}</div>}
            <button className="play-again-btn" onClick={initGame}>Play Again</button>
          </div>
        </div>
      )}
    </div>
  );
}

// 19. FLASHCARD FLIP
// ═══════════════════════════════════════════════════════════
function FlashcardFlip({ age, onBack }) {
  const cards = useRef(shuffle([...(FLASHCARDS[age] || FLASHCARDS["5-6"])]));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(0);

  const card = cards.current[idx % total];

  const next = (didKnow) => {
    if (didKnow) setKnown(k => k + 1);
    setFlipped(false);
    setTimeout(() => setIdx(i => i + 1), 200);
  };

  const done = idx >= total;

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">🃏 {Math.min(idx+1, total)}/{total}</div>

      <h2 className="game-title">🃏 Flashcard Flip</h2>
      {!done ? (
        <React.Fragment>
          <p className="game-instruction">Tap the card to reveal the clue!</p>
          <p className="fc-tap-hint">👆 Tap to flip</p>
          <div className={`fc-card ${flipped ? "flipped" : ""}`} onClick={() => setFlipped(f => !f)}>
            <div className="fc-inner">
              <div className="fc-face fc-front">
                <span className="fc-word">{card.word}</span>
                <span className="fc-sub">Tap to see hint</span>
              </div>
              <div className="fc-face fc-back">
                <span className="fc-hint">{card.hint}</span>
              </div>
            </div>
          </div>
          {flipped && (
            <div className="fc-nav">
              <button className="fc-nav-btn" onClick={() => next(false)} title="Still learning">🤔</button>
              <span className="fc-counter">Know it?</span>
              <button className="fc-nav-btn" onClick={() => next(true)} title="I know it!" style={{background:"var(--green)"}}>✅</button>
            </div>
          )}

      ) : (
        <div className="win-overlay">
          <div className="win-card">
            <div className="win-emoji">🃏</div>
            <h3>All Done!</h3>
            <p>You knew {known} out of {total} cards!</p>

          </div>
        </div>
      )}
    </div>
  );
}

    livesRef.current = 5;
    goRef.current = false;
    setScore(0);
    setLives(5);
    setGameOver(false);
    setFalling([]);
    newWord();
  }, [newWord]);

  useEffect(() => { startGame(); }, []);

  useEffect(() => {
    if (gameOver || !targetWord) return;
    spawnRef.current = setInterval(() => {
      if (goRef.current) return;
      const tw = targetRef.current;
      const needed = tw.split("").filter(c => !collectedRef.current.includes(c));
      const spawnTarget = needed.length > 0 && Math.random() < 0.45;
      const letter = spawnTarget
        ? needed[Math.floor(Math.random() * needed.length)]
        : "abcdefghijklmnopqrstuvwxyz"[Math.floor(Math.random() * 26)];
      const isNeeded = tw.includes(letter) && needed.includes(letter);
      const id = Date.now() + Math.random();
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      setFalling(prev => [...prev, { id, letter, x: 5 + Math.random() * 75, isNeeded, color }]);
      setTimeout(() => {
        setFalling(prev => {
          const f = prev.find(x => x.id === id);
          if (f && f.isNeeded && !goRef.current) {
            const nl = livesRef.current - 1;
            livesRef.current = nl;
            setLives(nl);
            if (nl <= 0) { goRef.current = true; setGameOver(true); }
          }
          return prev.filter(x => x.id !== id);
        });
      }, FALL_MS + 100);
    }, SPAWN_MS);
    return () => clearInterval(spawnRef.current);
  }, [targetWord, gameOver]);

  const catchLetter = (f) => {
    if (goRef.current) return;
    setFalling(prev => prev.filter(x => x.id !== f.id));
    const tw = targetRef.current;
    const needed = tw.split("").filter(c => !collectedRef.current.includes(c));
    if (f.isNeeded && needed.includes(f.letter)) {
      const nc = [...collectedRef.current, f.letter];
      collectedRef.current = nc;
      setCollected([...nc]);
      const done = tw.split("").every(c => nc.includes(c));
      if (done) {
        setScore(s => s + 1);
        confetti(14);
        setTimeout(newWord, 600);
      }
    } else if (!tw.includes(f.letter)) {
      const nl = livesRef.current - 1;
      livesRef.current = nl;
      setLives(nl);
      if (nl <= 0) { goRef.current = true; setGameOver(true); }
    }
  };

  return (
    <div className="game-container">
      <style>{`@keyframes lrFall{from{top:-8%}to{top:108%}}.lr-letter-css{position:absolute;animation:lrFall ${FALL_MS}ms linear forwards;border:none;border-radius:10px;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:700;cursor:pointer;padding:10px 14px;color:#fff;transition:transform .1s}.lr-letter-css:hover{transform:scale(1.2)}`}</style>
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {score} | ❤️ {lives}</div>
      </div>
      <h2 className="game-title">🌧️ Letter Rain</h2>
      <p className="game-instruction">Catch the letters to spell the word!</p>
      <div className="lr-word">{targetWord.toUpperCase()}</div>
      <div className="lr-progress">
        Collected: {targetWord.split("").map((c,i) => (
          <span key={i} style={{color: collected.includes(c) ? "var(--green)" : "var(--text-dim)", marginRight:4, fontFamily:"'Fredoka',sans-serif", fontWeight:700}}>
            {collected.includes(c) ? c.toUpperCase() : "_"}
          </span>
        ))}
      </div>
      <div className="lr-area">
        {falling.map(f => (
          <button key={f.id} className="lr-letter-css" style={{ left: f.x + "%", background: f.color }} onClick={() => catchLetter(f)}>
            {f.letter.toUpperCase()}
          </button>
        ))}
      </div>
      {gameOver && (
        <div className="win-overlay">
          <div className="win-card">
            <div className="win-emoji">🌧️</div>
            <h3>Game Over!</h3>
            <p>Words completed: {score}</p>
            <button className="play-again-btn" onClick={startGame}>Play Again</button>
          </div>
        </div>
      )}
    </div>
  );
}

// 23. COMPOUND WORDS
// ═══════════════════════════════════════════════════════════
function CompoundWords({ age, onBack }) {
  const pool = useRef(shuffle([...COMPOUND_WORDS]));
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [selectedA, setSelectedA] = useState(null);
  const [selectedB, setSelectedB] = useState(null);
  const [matched, setMatched] = useState(new Set());
  const [result, setResult] = useState("");
  const [feedback, setFeedback] = useState("");

  // Show 4 items at a time
  const batch = pool.current.slice(idx, idx + 4);
  const allMatched = matched.size === batch.length && batch.length > 0;

  const pickA = (item) => {
    if (matched.has(item.result)) return;
    setSelectedA(item);
    setResult("");
    setFeedback("");
  };
  const pickB = (item) => {
    if (!selectedA || matched.has(item.result)) return;
    if (selectedA.b === item.b) {
      const combined = selectedA.a + item.b;
      if (combined === item.result && selectedA.result === item.result) {
        setMatched(m => new Set([...m, item.result]));
        setResult(item.result);
        setScore(s => s + 1);
        confetti(10);
        setSelectedA(null);
        setSelectedB(null);
        setFeedback("correct");
        setTimeout(() => setFeedback(""), 1000);
      }
    } else {
      setSelectedB(item);
      setFeedback("wrong");
      setTimeout(() => { setSelectedA(null); setSelectedB(null); setFeedback(""); }, 800);
    }
  };

  const nextBatch = () => { setIdx(i => i + 4); setMatched(new Set()); setSelectedA(null); setSelectedB(null); setResult(""); setFeedback(""); };

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {score}</div>
      </div>
      <h2 className="game-title">🔗 Compound Words</h2>
      <p className="game-instruction">Click a first-half, then its matching second-half to make a compound word!</p>
      <div className="cw-result">{result ? "✨ " + result + "!" : ""}</div>
      <div>
        <p style={{textAlign:"center",fontSize:".85rem",color:"var(--text-dim)",marginBottom:8}}>First halves:</p>
        <div className="cw-halves">
          {batch.map(item => (
            <button key={item.result + "a"} className={`cw-half ${selectedA?.result === item.result ? "cw-selected" : ""} ${matched.has(item.result) ? "cw-matched" : ""}`}
              onClick={() => pickA(item)} disabled={matched.has(item.result)}>
              {item.a}
            </button>
          ))}
        </div>
        <p style={{textAlign:"center",fontSize:".85rem",color:"var(--text-dim)",marginBottom:8}}>Second halves:</p>
        <div className="cw-halves">
          {shuffle(batch.map(item => item)).map(item => (
            <button key={item.result + "b"} className={`cw-half ${matched.has(item.result) ? "cw-matched" : ""}`}
              onClick={() => pickB(item)} disabled={matched.has(item.result) || !selectedA}>
              {item.b}
            </button>
          ))}
        </div>
      </div>
      {allMatched && <button className="next-btn" style={{display:"block",margin:"20px auto 0"}} onClick={nextBatch}>Next Round →</button>}
      {feedback === "correct" && <div className="feedback-popup correct-popup">✅ Compound word!</div>}
      {feedback === "wrong" && <div className="feedback-popup wrong-popup">❌ Try again!</div>}
    </div>
  );
}

// 24. PREPOSITION QUEST
// ═══════════════════════════════════════════════════════════
function PrepositionQuest({ age, onBack }) {
  const data = PREPOSITIONS[age] || PREPOSITIONS["5-6"];
  const shuffled = useRef(shuffle([...data]));
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [total, setTotal] = useState(0);
  const [feedback, setFeedback] = useState("");
  const [chosen, setChosen] = useState(null);
  const item = shuffled.current[idx % shuffled.current.length];

  const choose = (opt) => {
    if (feedback) return;
    setTotal(t => t + 1);
    setChosen(opt);
    if (opt === item.answer) {
      setScore(s => s + 1);
      setFeedback("correct");
      confetti(12);
      setTimeout(() => { setFeedback(""); setChosen(null); setIdx(i => i + 1); }, 1400);
    } else {
      setFeedback("wrong");
      setTimeout(() => { setFeedback(""); setChosen(null); }, 1000);
    }
  };

  const renderSentence = () => {
    const parts = item.sentence.split("___");
    return <span>{parts[0]}<span className="pq-blank">{chosen || "___"}</span>{parts[1]}</span>;
  };

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {score}/{total}</div>

        <div style={{fontSize:"2rem",marginBottom:12}}>{item.emoji}</div>
        {renderSentence()}
      </div>
      <div className="pq-options">
        {item.options.map(opt => (
          <button key={opt} className={`pq-btn ${feedback === "correct" && opt === item.answer ? "correct-opt" : ""} ${feedback === "wrong" && opt === chosen ? "wrong-opt" : ""}`}
            onClick={() => choose(opt)} disabled={!!feedback}>
            {opt}
          </button>
        ))}
      </div>
      <button className="skip-btn" onClick={() => { setFeedback(""); setChosen(null); setIdx(i => i + 1); }}>Skip →</button>
      {feedback === "correct" && <div className="feedback-popup correct-popup">🎉 Correct!</div>}
      {feedback === "wrong" && <div className="feedback-popup wrong-popup">Try: {item.answer}</div>}
    </div>
  );
}

// 25. PICTURE VOCAB
// ═══════════════════════════════════════════════════════════
function PictureVocab({ age, onBack }) {
  const all = shuffle([...EMOJI_VOCAB]);
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [total, setTotal] = useState(0);
  const [feedback, setFeedback] = useState("");
  const [options, setOptions] = useState([]);

  const loadRound = useCallback((i) => {
    const item = all[i % all.length];
    const wrong = shuffle(all.filter(x => x.answer !== item.answer)).slice(0, 3).map(x => x.answer);
    setOptions(shuffle([item.answer, ...wrong]));
    setFeedback("");
  }, [all]);

  useEffect(() => { loadRound(0); }, []);

  const choose = (opt) => {
    if (feedback) return;
    setTotal(t => t + 1);
    const item = all[idx % all.length];
    if (opt === item.answer) {
      setScore(s => s + 1);
      setFeedback("correct");
      confetti(14);
      setTimeout(() => { const ni = idx + 1; setIdx(ni); loadRound(ni); }, 1200);
    } else {
      setFeedback(opt);
      setTimeout(() => setFeedback(""), 900);
    }
  };

  const item = all[idx % all.length];
  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {score}/{total}</div>
      </div>
      <h2 className="game-title">🖼️ Picture Vocab</h2>
      <p className="game-instruction">What is this? Choose the correct English word!</p>
      <div className="pv-emoji">{item.emoji}</div>
      <div className="pv-options">
        {options.map(opt => (
          <button key={opt} className={`pv-btn ${feedback === "correct" && opt === item.answer ? "correct-opt" : ""} ${feedback === opt && opt !== item.answer ? "wrong-opt" : ""}`}
            onClick={() => choose(opt)} disabled={!!feedback}>
            {opt}
          </button>
        ))}
      </div>
      {feedback === "correct" && <div className="feedback-popup correct-popup">🌟 Yes!</div>}
      {feedback && feedback !== "correct" && <div className="feedback-popup wrong-popup">It's: {item.answer}!</div>}
    </div>
  );
}

// 26. VOWEL OR CONSONANT
// ═══════════════════════════════════════════════════════════
function VowelOrConsonant({ age, onBack }) {
  const VOWELS = new Set(["a","e","i","o","u"]);
  const letters = "abcdefghijklmnopqrstuvwxyz".split("");
  const [current, setCurrent] = useState("");
  const [score, setScore] = useState(0);
  const [total, setTotal] = useState(0);
  const [feedback, setFeedback] = useState("");
  const [streak, setStreak] = useState(0);

  const newLetter = useCallback(() => {
    setCurrent(letters[Math.floor(Math.random() * letters.length)]);
    setFeedback("");
  }, []);

  useEffect(() => { newLetter(); }, []);

  const answer = (isVowel) => {
    if (feedback) return;
    const correct = VOWELS.has(current) === isVowel;
    setTotal(t => t + 1);
    if (correct) {
      setScore(s => s + 1);
      setStreak(s => s + 1);
      setFeedback("correct");
      confetti(10);
      setTimeout(newLetter, 900);
    } else {
      setStreak(0);
      setFeedback("wrong");
      setTimeout(newLetter, 1000);
    }
  };

  return (
    <div className="game-container">
      <div className="game-header">
        <button className="back-btn" onClick={onBack}>← Back</button>
        <div className="score-display">⭐ {score}/{total}</div>
      </div>
      <h2 className="game-title">🔡 Vowel or Consonant?</h2>
      <p className="game-instruction">Is it a vowel (A E I O U) or a consonant?</p>
      {streak >= 3 && <p style={{textAlign:"center",color:"var(--yellow)",fontFamily:"'Fredoka',sans-serif",marginBottom:8}}>🔥 Streak: {streak}</p>}
      <div style={{fontFamily:"'Fredoka',sans-serif",fontSize:"6rem",fontWeight:700,textAlign:"center",margin:"20px 0",color:"var(--teal)",textTransform:"uppercase",animation:"bounceIn .3s ease"}}>
        {current}
      </div>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginBottom:20}}>
        <button className="quiz-btn" style={{background:"linear-gradient(135deg,var(--pink),#c026d3)",color:"#fff",border:"none",flex:1,maxWidth:160,fontSize:"1.2rem"}}
          onClick={() => answer(true)} disabled={!!feedback}>
          🌸 Vowel
        </button>
        <button className="quiz-btn" style={{background:"linear-gradient(135deg,var(--teal),#0d9488)",color:"#fff",border:"none",flex:1,maxWidth:160,fontSize:"1.2rem"}}
          onClick={() => answer(false)} disabled={!!feedback}>
          🔷 Consonant
        </button>
      </div>
      <p style={{textAlign:"center",color:"var(--text-dim)",fontSize:".85rem"}}>Vowels: A · E · I · O · U</p>
      {feedback === "correct" && <div className="feedback-popup correct-popup">✅ Correct!</div>}
      {feedback === "wrong" && <div className="feedback-popup wrong-popup">❌ {VOWELS.has(current) ? "It's a VOWEL!" : "It's a CONSONANT!"}</div>}
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState("home");
  const [age, setAge] = useState(null);
  const [game, setGame] = useState(null);

  // PLAY SCREEN
  if (screen === "play" && game && age) {
    const GameComp = game.component;
    return <GameComp age={age} onBack={() => setScreen("games")} />;
  }

  // GAMES GRID
  if (screen === "games" && age) {
    const ageGroup = AGE_GROUPS.find(a => a.id === age);
    return (
      <div className="games-screen">
        <div className="games-top-bar">
          <button className="back-btn" onClick={() => setScreen("ages")}>← Back</button>
          <div className="age-badge">{ageGroup.emoji} {ageGroup.label}</div>
        </div>
        <h1 className="games-heading">Choose Your Game</h1>
        <p className="games-sub">Pick a game and start learning!</p>
        <div className="games-grid">
          {GAMES.map((g, i) => (
            <button key={g.id} className="game-card" style={{ "--card-color": g.color, "--card-delay": (i * 0.06) + "s" }} onClick={() => { setGame(g); setScreen("play"); }}>
              <div className="game-card-emoji">{g.emoji}</div>
              <div className="game-card-name">{g.name}</div>
              <div className="game-card-desc">{g.desc}</div>
              <div className="game-card-shine"></div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // AGE SELECT
  if (screen === "ages") {
    return (
      <div className="age-screen">
        <button className="back-btn top-back" onClick={() => setScreen("home")}>← Home</button>
        <h1 className="age-heading">How Old Are You?</h1>
        <p className="age-sub">Choose your age group to get started!</p>
        <div className="age-grid">
          {AGE_GROUPS.map((group, i) => (
            <button key={group.id} className="age-card" style={{ "--age-color": group.color, "--age-delay": (i * 0.1) + "s" }} onClick={() => { setAge(group.id); setScreen("games"); }}>
              <div className="age-emoji">{group.emoji}</div>
              <div className="age-label">{group.label}</div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // HOME SCREEN
  return (
    <div className="home-screen">
      <div className="home-bg-shapes">
        <div className="shape shape-1"></div>
        <div className="shape shape-2"></div>
        <div className="shape shape-3"></div>
        <div className="shape shape-4"></div>
        <div className="shape shape-5"></div>
      </div>
      <div className="home-content">
        <div className="home-icon-row">
          <span className="bounce-icon" style={{ animationDelay: "0s" }}>🎮</span>
          <span className="bounce-icon" style={{ animationDelay: "0.2s" }}>📚</span>
          <span className="bounce-icon" style={{ animationDelay: "0.4s" }}>🌟</span>
        </div>
        <h1 className="home-title">
          <span className="title-word" style={{ "--tw-color": "#FF6B9D" }}>English</span>{" "}
          <span className="title-word" style={{ "--tw-color": "#4ECDC4" }}>Game</span>{" "}
          <span className="title-word" style={{ "--tw-color": "#FFE66D" }}>Zone</span>
        </h1>
        <p className="home-subtitle">Learn English Through Fun & Interactive Games!</p>
        <button className="start-btn" onClick={() => setScreen("ages")}>
          <span>Let's Play!</span>
          <span className="btn-arrow">→</span>
        </button>
        <div className="home-features">
          <div className="feature"><span>🎯</span> 26 Fun Games</div>
          <div className="feature"><span>📊</span> 4 Age Levels</div>
          <div className="feature"><span>🏆</span> Track Your Score</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
