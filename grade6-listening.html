<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunRey English Course – Alphabet Words</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5BC8F5;
    --sun: #FFD94D;
    --grass: #6DD96D;
    --coral: #FF7B7B;
    --violet: #B57BFF;
    --peach: #FFB347;
    --mint: #4DDBC4;
    --bg: #FFF8EC;
    --card-radius: 22px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #5BC8F5 0%, #B57BFF 100%);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 50%, rgba(255,255,255,.18) 0%, transparent 60%),
                radial-gradient(circle at 80% 30%, rgba(255,255,255,.12) 0%, transparent 50%);
  }
  .logo-badge {
    display: inline-block;
    background: var(--sun);
    color: #7A4F00;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 4px 18px;
    border-radius: 30px;
    margin-bottom: 10px;
    box-shadow: 0 3px 0 #C89A00;
    letter-spacing: 1px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 7vw, 3.4rem);
    color: #fff;
    text-shadow: 0 4px 0 rgba(0,0,0,.15);
    line-height: 1.1;
  }
  header p {
    color: rgba(255,255,255,.9);
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 6px;
    letter-spacing: .3px;
  }
  .stars {
    font-size: 1.5rem;
    margin-top: 8px;
    animation: bounce-stars 1.4s ease-in-out infinite alternate;
  }
  @keyframes bounce-stars { from{transform:translateY(0)} to{transform:translateY(-6px)} }

  /* ── SECTION LABEL ── */
  .section-label {
    text-align: center;
    margin: 32px auto 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #6B3EC0;
    position: relative;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .section-label::before, .section-label::after {
    content: '';
    height: 3px; flex: 1; max-width: 80px;
    background: linear-gradient(90deg, transparent, #B57BFF);
    border-radius: 4px;
  }
  .section-label::after { background: linear-gradient(90deg, #B57BFF, transparent); }

  /* ── GRID ── */
  .alphabet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 18px;
    padding: 0 20px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: var(--card-radius);
    padding: 20px 14px 16px;
    text-align: center;
    cursor: pointer;
    position: relative;
    box-shadow: 0 6px 0 #D8D0E8, 0 8px 20px rgba(0,0,0,.08);
    transition: transform .15s, box-shadow .15s;
    border: 3px solid transparent;
    animation: pop-in .4s ease both;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.04);
    box-shadow: 0 10px 0 #C9C0DE, 0 12px 28px rgba(0,0,0,.12);
  }
  .card:active { transform: scale(.97); }

  @keyframes pop-in {
    from { opacity:0; transform:scale(.7) translateY(20px); }
    to   { opacity:1; transform:scale(1)  translateY(0); }
  }

  /* colour themes per row */
  .card[data-theme="sky"]    { border-color: var(--sky);    box-shadow: 0 6px 0 #3AABDE, 0 8px 20px rgba(0,0,0,.08); }
  .card[data-theme="sun"]    { border-color: var(--sun);    box-shadow: 0 6px 0 #D4A800, 0 8px 20px rgba(0,0,0,.08); }
  .card[data-theme="grass"]  { border-color: var(--grass);  box-shadow: 0 6px 0 #3BB83B, 0 8px 20px rgba(0,0,0,.08); }
  .card[data-theme="coral"]  { border-color: var(--coral);  box-shadow: 0 6px 0 #D84F4F, 0 8px 20px rgba(0,0,0,.08); }
  .card[data-theme="violet"] { border-color: var(--violet); box-shadow: 0 6px 0 #7F3FD4, 0 8px 20px rgba(0,0,0,.08); }
  .card[data-theme="peach"]  { border-color: var(--peach);  box-shadow: 0 6px 0 #C97A10, 0 8px 20px rgba(0,0,0,.08); }

  .card-emoji { font-size: 3rem; line-height: 1; margin-bottom: 8px; display: block; }

  .card-letter {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    line-height: 1;
    color: #333;
  }
  .card[data-theme="sky"]    .card-letter { color: #1592C5; }
  .card[data-theme="sun"]    .card-letter { color: #B08000; }
  .card[data-theme="grass"]  .card-letter { color: #2A8F2A; }
  .card[data-theme="coral"]  .card-letter { color: #C03535; }
  .card[data-theme="violet"] .card-letter { color: #7030B0; }
  .card[data-theme="peach"]  .card-letter { color: #A05910; }

  .card-word {
    font-size: 1rem;
    font-weight: 800;
    margin-top: 5px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .card-translation {
    font-size: .82rem;
    font-weight: 600;
    color: #999;
    margin-top: 2px;
  }

  /* speaking wave */
  .speak-btn {
    margin-top: 10px;
    background: none; border: none; cursor: pointer;
    font-size: 1.3rem;
    transition: transform .2s;
  }
  .speak-btn:hover { transform: scale(1.3); }

  /* ── POPUP ── */
  .popup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .popup-overlay.active { display: flex; }
  .popup {
    background: #fff;
    border-radius: 28px;
    padding: 36px 30px 28px;
    text-align: center;
    max-width: 340px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: pop-in .3s ease;
    position: relative;
  }
  .popup-emoji { font-size: 5rem; }
  .popup-letter {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    margin: 10px 0 4px;
  }
  .popup-word { font-size: 1.5rem; font-weight: 800; color: #333; text-transform: uppercase; }
  .popup-translation { color: #888; font-weight: 700; font-size: 1rem; margin-top: 4px; }
  .popup-phrase {
    background: #F3EDFF; border-radius: 14px; padding: 12px 16px;
    margin: 16px 0; font-weight: 700; font-size: 1rem; color: #6030A0; line-height: 1.5;
  }
  .popup-close {
    position: absolute; top: 14px; right: 18px;
    background: #FFD94D; border: none; border-radius: 50%;
    width: 34px; height: 34px; font-size: 1.1rem; cursor: pointer;
    font-weight: 800; color: #7A4F00; box-shadow: 0 3px 0 #C89A00;
  }
  .popup-speak {
    background: linear-gradient(135deg, #5BC8F5, #B57BFF);
    color: #fff; border: none; border-radius: 30px;
    padding: 10px 28px; font-size: 1rem; font-weight: 800;
    cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 0 rgba(0,0,0,.15);
    transition: transform .15s;
  }
  .popup-speak:hover { transform: scale(1.05); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px 20px 32px;
    font-weight: 700;
    color: #B57BFF;
    font-size: .9rem;
  }
  footer span { color: var(--coral); }
</style>
</head>
<body>

<header>
  <div class="logo-badge">🌟 BunRey English Course</div>
  <h1>ABC Alphabet Words</h1>
  <p>For Kids Age 5 – Belajar Sambil Bermain!</p>
  <div class="stars">⭐ ⭐ ⭐</div>
</header>

<div class="section-label">🎉 Klik kartu untuk belajar lebih! 🎉</div>

<div class="alphabet-grid" id="grid"></div>

<!-- POPUP -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup" id="popup">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-emoji" id="p-emoji"></div>
    <div class="popup-letter" id="p-letter"></div>
    <div class="popup-word" id="p-word"></div>
    <div class="popup-translation" id="p-translation"></div>
    <div class="popup-phrase" id="p-phrase"></div>
    <button class="popup-speak" onclick="speakPopup()">🔊 Dengarkan!</button>
  </div>
</div>

<footer>Made with <span>♥</span> by BunRey English Course · Materi Kelas Awal</footer>

<script>
const data = [
  { l:"A", w:"Apple",      t:"Apel",          e:"🍎", phrase:"A is for Apple. I love apple!" },
  { l:"B", w:"Ball",       t:"Bola",           e:"⚽", phrase:"B is for Ball. Let's play ball!" },
  { l:"C", w:"Cat",        t:"Kucing",         e:"🐱", phrase:"C is for Cat. The cat says meow!" },
  { l:"D", w:"Dolphin",    t:"Lumba-lumba",    e:"🐬", phrase:"D is for Dolphin. Dolphins love to swim!" },
  { l:"E", w:"Elephant",   t:"Gajah",          e:"🐘", phrase:"E is for Elephant. It has big ears!" },
  { l:"F", w:"Fish",       t:"Ikan",           e:"🐟", phrase:"F is for Fish. Fish can swim fast!" },
  { l:"G", w:"Grape",      t:"Anggur",         e:"🍇", phrase:"G is for Grape. Grapes are yummy!" },
  { l:"H", w:"Hat",        t:"Topi",           e:"🎩", phrase:"H is for Hat. I wear a hat!" },
  { l:"I", w:"Ice Cream",  t:"Es Krim",        e:"🍦", phrase:"I is for Ice Cream. So cold and sweet!" },
  { l:"J", w:"Juice",      t:"Jus",            e:"🧃", phrase:"J is for Juice. Juice is healthy!" },
  { l:"K", w:"Kite",       t:"Layangan",       e:"🪁", phrase:"K is for Kite. Fly the kite high!" },
  { l:"L", w:"Lion",       t:"Singa",          e:"🦁", phrase:"L is for Lion. The lion says roar!" },
  { l:"M", w:"Monkey",     t:"Monyet",         e:"🐒", phrase:"M is for Monkey. Monkey loves bananas!" },
  { l:"N", w:"Nest",       t:"Sarang",         e:"🪹", phrase:"N is for Nest. Birds live in a nest!" },
  { l:"O", w:"Orange",     t:"Jeruk",          e:"🍊", phrase:"O is for Orange. Orange is juicy!" },
  { l:"P", w:"Panda",      t:"Panda",          e:"🐼", phrase:"P is for Panda. Panda eats bamboo!" },
  { l:"Q", w:"Queen",      t:"Ratu",           e:"👑", phrase:"Q is for Queen. The queen wears a crown!" },
  { l:"R", w:"Rainbow",    t:"Pelangi",        e:"🌈", phrase:"R is for Rainbow. So many colors!" },
  { l:"S", w:"Sun",        t:"Matahari",       e:"☀️", phrase:"S is for Sun. The sun is bright!" },
  { l:"T", w:"Tiger",      t:"Harimau",        e:"🐯", phrase:"T is for Tiger. Tiger has stripes!" },
  { l:"U", w:"Umbrella",   t:"Payung",         e:"☂️", phrase:"U is for Umbrella. It keeps me dry!" },
  { l:"V", w:"Violin",     t:"Biola",          e:"🎻", phrase:"V is for Violin. I play violin!" },
  { l:"W", w:"Watermelon", t:"Semangka",       e:"🍉", phrase:"W is for Watermelon. So fresh!" },
  { l:"X", w:"Xylophone",  t:"Xilofon",        e:"🎵", phrase:"X is for Xylophone. It makes music!" },
  { l:"Y", w:"Yogurt",     t:"Yogurt",         e:"🥛", phrase:"Y is for Yogurt. Yogurt is yummy!" },
  { l:"Z", w:"Zebra",      t:"Zebra",          e:"🦓", phrase:"Z is for Zebra. Zebra has black and white stripes!" },
];

const themes = ["sky","sun","grass","coral","violet","peach"];
const grid = document.getElementById("grid");

data.forEach((item, i) => {
  const theme = themes[Math.floor(i / 5) % themes.length];
  const delay = (i * 0.04).toFixed(2);
  const card = document.createElement("div");
  card.className = "card";
  card.setAttribute("data-theme", theme);
  card.style.animationDelay = delay + "s";
  card.innerHTML = `
    <span class="card-emoji">${item.e}</span>
    <div class="card-letter">${item.l}</div>
    <div class="card-word">${item.w}</div>
    <div class="card-translation">${item.t}</div>
    <button class="speak-btn" title="Dengarkan" onclick="event.stopPropagation(); speak('${item.l} is for ${item.w}. ${item.w}.')">🔊</button>
  `;
  card.addEventListener("click", () => openPopup(item));
  grid.appendChild(card);
});

let popupItem = null;
function openPopup(item) {
  popupItem = item;
  document.getElementById("p-emoji").textContent = item.e;
  document.getElementById("p-letter").textContent = item.l;
  document.getElementById("p-word").textContent = item.w;
  document.getElementById("p-translation").textContent = "🇮🇩 " + item.t;
  document.getElementById("p-phrase").innerHTML = `<em>"${item.phrase}"</em>`;
  document.getElementById("popup-overlay").classList.add("active");
  speak(item.phrase);
}
function closePopup() {
  document.getElementById("popup-overlay").classList.remove("active");
  window.speechSynthesis && window.speechSynthesis.cancel();
}
function speakPopup() { if(popupItem) speak(popupItem.phrase); }
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.65; u.pitch = 1.15;
  window.speechSynthesis.speak(u);
}
document.getElementById("popup-overlay").addEventListener("click", function(e){
  if(e.target === this) closePopup();
});
</script>
</body>
</html>
