<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LittleLume - Worksheet Preview</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #2C3E7A;
            --secondary: #7C5CBF;
            --accent-cyan: #00D9FF;
            --success: #10B981;
            --bg-light: #F8F9FD;
            --bg-card: #FFFFFF;
            --text-primary: #1A202C;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8F9FD 0%, #F5F7FC 100%);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ============= HEADER ============= */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(180deg, #0F1B4C 0%, #1A2B6E 50%, #0D1F40 100%);
            box-shadow: 0 8px 32px rgba(15, 27, 76, 0.3);
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }

        .toolbar-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, #00D9FF 100%);
            color: white;
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* ============= CONTENT ============= */
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem 2rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .error {
            background: #FEE2E2;
            border: 2px solid #FCA5A5;
            color: #991B1B;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            margin: 2rem 0;
        }

        .worksheet {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .worksheet-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }

        .worksheet-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .worksheet-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .worksheet-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(44, 62, 122, 0.05) 0%, rgba(0, 217, 255, 0.05) 100%);
            border-radius: 12px;
            border: 1px solid rgba(0, 217, 255, 0.1);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .questions-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 2rem 0 1.5rem;
            color: var(--primary);
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--accent-cyan);
        }

        .question {
            margin-bottom: 1.5rem;
            padding: 1.25rem;
            background: var(--bg-light);
            border-radius: 12px;
            border-left: 4px solid var(--accent-cyan);
            transition: all 0.3s ease;
        }

        .question:hover {
            box-shadow: var(--shadow-md);
        }

        .question-num {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        .question-text {
            margin-bottom: 1rem;
            font-weight: 500;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .option {
            padding: 0.75rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: var(--accent-cyan);
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(0, 217, 255, 0.02) 100%);
        }

        .fitb-question {
            padding: 0.5rem 0;
            line-height: 2.5;
        }

        .blank {
            display: inline-block;
            width: 150px;
            border-bottom: 2px solid var(--text-primary);
            margin: 0 4px;
        }

        .essay-prompt {
            padding: 1.25rem;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(0, 217, 255, 0.1) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            margin-bottom: 2rem;
            min-height: 150px;
        }

        .answer-space {
            padding: 1rem;
            text-align: center;
            border-top: 1px dashed var(--border);
            margin-top: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Print Styles */
        @media print {
            header {
                display: none;
            }

            .container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }

            .worksheet {
                page-break-inside: avoid;
                box-shadow: none;
                border: 1px solid var(--border);
                padding: 0;
            }

            .question {
                page-break-inside: avoid;
            }

            body {
                background: white;
            }

            .worksheet-info {
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .toolbar-buttons {
                width: 100%;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                justify-content: center;
                min-width: 120px;
            }

            .worksheet {
                padding: 1.5rem;
            }

            .worksheet-header h1 {
                font-size: 1.3rem;
            }

            .options {
                grid-template-columns: 1fr;
            }
        }

        footer {
            background: linear-gradient(180deg, #0F1B4C 0%, #1A2B6E 100%);
            color: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            text-align: center;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <!-- ============= HEADER ============= -->
    <header>
        <nav class="navbar">
            <a href="worksheet-portal.html" class="logo">✨ LittleLume - Worksheets</a>
            <div class="toolbar-buttons">
                <a href="worksheet-portal.html" class="btn btn-secondary">← Back to Generator</a>
                <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
                <button class="btn btn-primary" onclick="downloadHTML()">💾 Download</button>
            </div>
        </nav>
    </header>

    <!-- ============= CONTENT ============= -->
    <div class="container">
        <div class="loading" id="loading">📋 Loading worksheet...</div>
        <div id="worksheetContainer"></div>
    </div>

    <!-- ============= FOOTER ============= -->
    <footer>
        <p>© 2026 LittleLume - Worksheet Generator. All rights reserved.</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade');
        const skill = params.get('skill');
        const chapter = params.get('chapter');
        const questionCount = parseInt(params.get('count')) || 10;
        const difficulty = params.get('difficulty') || 'mixed';
        const questionType = params.get('type') || 'mixed';

        async function loadWorksheet() {
            try {
                const response = await fetch(`bank/grade${grade}.json`);
                if (!response.ok) throw new Error('Failed to load worksheet data');
                const gradeData = await response.json();

                const chapterData = gradeData.chapters.find(ch => ch.chapter === parseInt(chapter));
                if (!chapterData) throw new Error('Chapter not found');

                const skillData = chapterData[skill];
                if (!skillData) throw new Error('Skill data not found');

                let allQuestions = [];
                if (skillData.partA) allQuestions = allQuestions.concat(skillData.partA);
                if (skillData.partB) allQuestions = allQuestions.concat(skillData.partB);

                if (difficulty !== 'mixed') {
                    allQuestions = allQuestions.filter(q => q.difficulty === difficulty || !q.difficulty);
                }

                if (questionType !== 'mixed') {
                    if (questionType === 'mc') {
                        allQuestions = allQuestions.filter(q => q.options);
                    } else if (questionType === 'fitb') {
                        allQuestions = allQuestions.filter(q => !q.options);
                    }
                }

                const questions = allQuestions.slice(0, questionCount);
                renderWorksheet(grade, skill, chapter, chapterData, questions);
                document.getElementById('loading').style.display = 'none';

            } catch (error) {
                console.error(error);
                document.getElementById('worksheetContainer').innerHTML = `
                    <div class="error">
                        <h2>❌ Error Loading Worksheet</h2>
                        <p>${error.message}</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem;">Please go back and try again.</p>
                    </div>
                `;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderWorksheet(grade, skill, chapter, chapterData, questions) {
            const skillNames = {
                'listening': '🎧 Listening',
                'reading': '📖 Reading',
                'writing': '✍️ Writing',
                'speaking': '🗣️ Speaking'
            };

            let html = `
                <div class="worksheet">
                    <div class="worksheet-header">
                        <h1>📋 English Worksheet</h1>
                        <p>Grade ${grade} - ${chapterData.title}</p>
                    </div>

                    <div class="worksheet-info">
                        <div class="info-item">
                            <div class="info-label">Grade</div>
                            <div class="info-value">Grade ${grade}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Skill</div>
                            <div class="info-value">${skillNames[skill]}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Chapter</div>
                            <div class="info-value">Chapter ${chapter}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Questions</div>
                            <div class="info-value">${questions.length}</div>
                        </div>
                    </div>

                    <div class="questions-section">
                        <h2 class="section-title">Answer the following questions:</h2>
            `;

            questions.forEach((q, idx) => {
                if (q.options) {
                    html += `
                        <div class="question">
                            <div class="question-num">Question ${idx + 1}</div>
                            <div class="question-text">${q.question}</div>
                            <div class="options">
                                <div class="option">A) ${q.options[0]}</div>
                                <div class="option">B) ${q.options[1]}</div>
                                <div class="option">C) ${q.options[2]}</div>
                                <div class="option">D) ${q.options[3]}</div>
                            </div>
                            <div class="answer-space">Answer: ______</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="question">
                            <div class="question-num">Question ${idx + 1}</div>
                            <div class="fitb-question">${q.question}</div>
                            <div style="height: 50px;"></div>
                        </div>
                    `;
                }
            });

            html += `
                    </div>
                </div>
            `;

            document.getElementById('worksheetContainer').innerHTML = html;
        }

        function downloadHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `worksheet-grade${grade}-${skill}-chapter${chapter}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        loadWorksheet();
    </script>
</body>
</html>
