<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LittleLume - Grammar Learning</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#3A86FF;
  --purple:#7C5CBF;
  --pink:#FF4D8D;
  --yellow:#FFD93D;
  --green:#06D6A0;
  --orange:#FF6B35;
  --dark:#1A1A2E;
  --bg:#F8FAFF;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--dark);
  overflow-x:hidden;
}

/* ── HEADER ── */
header{
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg, #0a0e27 0%, #1a1f3a 50%, #0d1629 100%);
  color:white;
  text-align:center;
  padding:28px 20px 80px;
}

header::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(1px 1px at 5% 10%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 15% 40%, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 20% 70%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 25% 15%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 35% 80%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 40% 25%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 45% 60%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 60% 75%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 75% 85%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 80% 30%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 90% 12%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 95% 70%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 8% 42%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 12% 65%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 18% 88%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 22% 5%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 28% 78%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 32% 22%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 38% 92%, rgba(255,255,255,.8), transparent),
    radial-gradient(2px 2px at 42% 38%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 48% 68%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 52% 8%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 58% 48%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 62% 15%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 68% 62%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 72% 35%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 78% 58%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 82% 82%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 88% 28%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 92% 42%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 3% 75%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 6% 35%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 11% 5%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 19% 52%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 26% 38%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 34% 72%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 41% 8%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 51% 78%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 59% 22%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 67% 8%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 73% 68%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 81% 48%, rgba(255,255,255,.9), transparent),
    radial-gradient(2px 2px at 87% 75%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 93% 18%, rgba(255,255,255,.8), transparent);
  pointer-events:none;
  animation:twinkling 3s ease-in-out infinite;
}

@keyframes twinkling {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

#plantCanvas{
  position:absolute;
  bottom:0;left:0;
  width:100%;height:90px;
  pointer-events:none;
}

header h1{
  font-family:'Fredoka',sans-serif;
  font-size:1.9rem;
  margin-bottom:10px;
  position:relative;
  text-shadow:0 3px 16px rgba(90,50,150,0.25);
  letter-spacing:.5px;
}

header h2{
  font-family:'Fredoka',sans-serif;
  font-size:1.5rem;
  margin-bottom:15px;
  position:relative;
  text-shadow:0 3px 16px rgba(90,50,150,0.25);
  letter-spacing:.5px;
}

header > p{
  font-size:.95rem;
  opacity:.95;
  position:relative;
  font-weight:600;
  text-shadow:0 1px 6px rgba(0,0,0,.12);
}

.littlelume-text{
  background:linear-gradient(135deg,#7dd3fc,#e0e7ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle-main{
  font-size:1rem;
  margin-bottom:5px;
}

.subtitle-sub{
  font-size:.85rem;
  opacity:.85;
  margin-bottom:20px;
}

.hero-btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 28px;
  background:#3A86FF;
  color:white;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
  font-size:.95rem;
  transition:.3s;
  box-shadow:0 8px 20px rgba(58,134,255,0.3);
}

.hero-btn:hover{
  background:#2563eb;
  transform:translateY(-3px);
  box-shadow:0 12px 24px rgba(58,134,255,0.4);
}

/* ── CONTAINER ── */
.container{
  max-width:1200px;
  margin:0 auto;
  padding:40px 20px;
}

/* ── SECTION TITLE ── */
.section-title{
  font-family:'Fredoka',sans-serif;
  font-size:1.8rem;
  margin-bottom:35px;
  color:var(--dark);
  text-align:center;
}

/* ── GRAMMAR GRID ── */
.grammar-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  margin-bottom:40px;
}

/* ── LESSON CARD ── */
.grammar-card{
  background:white;
  border-radius:22px;
  padding:22px 22px 20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  transition:.28s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-top:5px solid transparent;
}
.grammar-card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 20px 40px rgba(0,0,0,0.13);
}

.grammar-card:nth-child(1){ border-top-color:#74b9ff; background:linear-gradient(180deg,#dbeeff 0%,white 90px); }
.grammar-card:nth-child(2){ border-top-color:#00b894; background:linear-gradient(180deg,#d4f5e9 0%,white 90px); }
.grammar-card:nth-child(3){ border-top-color:#e17055; background:linear-gradient(180deg,#ffe5d9 0%,white 90px); }
.grammar-card:nth-child(4){ border-top-color:#6c5ce7; background:linear-gradient(180deg,#e8e2ff 0%,white 90px); }
.grammar-card:nth-child(5){ border-top-color:#fdcb6e; background:linear-gradient(180deg,#fff4cc 0%,white 90px); }
.grammar-card:nth-child(6){ border-top-color:#fd79a8; background:linear-gradient(180deg,#ffd6e8 0%,white 90px); }

.grammar-card a{
  text-decoration:none;
  font-size:1.12rem;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:8px;
  line-height:1.3;
  transition:.2s;
}
.grammar-card:nth-child(1) a{ color:#1a5a9a; }
.grammar-card:nth-child(2) a{ color:#0d6e4a; }
.grammar-card:nth-child(3) a{ color:#8a3210; }
.grammar-card:nth-child(4) a{ color:#3a1a8a; }
.grammar-card:nth-child(5) a{ color:#7a5500; }
.grammar-card:nth-child(6) a{ color:#7a0035; }

.grammar-card a:hover{ opacity:.75; }

.grammar-card a::after{
  content:'→';
  margin-left:auto;
  font-size:1rem;
  opacity:.5;
  transition:.2s;
}
.grammar-card:hover a::after{
  opacity:1;
  transform:translateX(3px);
}

/* ── BACK BUTTON ── */
.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 20px;
  background:#3A86FF;
  color:white;
  text-decoration:none;
  border-radius:50px;
  font-weight:600;
  font-size:.9rem;
  transition:.3s;
  margin-bottom:30px;
}

.back-btn:hover{
  background:#2563eb;
  transform:translateX(-3px);
}

/* ── FOOTER ── */
footer{
  margin-top:70px;
  background:var(--dark);
  color:white;
  text-align:center;
  padding:30px;
}

@media(max-width:768px){
  header h1{ font-size:2.2rem; }
  header h2{ font-size:1.2rem; }
  .section-title{ font-size:1.5rem; }
  .grammar-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<header>
  <h1><span class="littlelume-text">LittleLume</span></h1>
  <h2 id="gradeTitle">Grammar - Grade 4</h2>
  <p class="subtitle-main">Master English Grammar Rules</p>
  <p class="subtitle-sub">Learn grammar concepts step by step</p>
  <canvas id="plantCanvas"></canvas>
</header>

<div class="container">
  <a href="../../" class="back-btn">← Back to Grade</a>
  
  <h2 class="section-title" id="materialTitle">📚 Grammar Topics</h2>

  <div class="grammar-grid" id="grammarGrid">
    <!-- Cards akan diisi oleh JavaScript -->
  </div>
</div>

<footer>
  <h3>BunRey English Course</h3>
  <p>Listening • Reading • Speaking • Writing • Grammar</p>
</footer>

<script>
// Data untuk semua grammar topics
const grammarTopics = [
  {
    id: 'tenses',
    name: '⏰ Tenses',
    icon: '📘',
    description: 'Present, Past, and Future tenses'
  },
  {
    id: 'part_of_speech',
    name: '📗 Part of Speech',
    icon: '📗',
    description: 'Nouns, Verbs, Adjectives, and more'
  },
  {
    id: 'sentence_structure',
    name: '📙 Sentence Structure',
    icon: '📙',
    description: 'Building correct sentences'
  },
  {
    id: 'active_passive_voice',
    name: '📕 Active & Passive Voice',
    icon: '📕',
    description: 'Understanding voice usage'
  },
  {
    id: 'direct_indirect_speech',
    name: '📓 Direct & Indirect Speech',
    icon: '📓',
    description: 'Reporting speech correctly'
  },
  {
    id: 'modal_verbs',
    name: '📔 Modal Verbs',
    icon: '📔',
    description: 'Can, Could, Will, Would, etc.'
  }
];

// Ambil grade level dari URL
function getGradeLevel() {
  const path = window.location.pathname;
  const match = path.match(/grade(\d+)/);
  return match ? match[1] : '1';
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  const grade = getGradeLevel();
  const gradeNames = {
    '1': 'Grade 1',
    '2': 'Grade 2',
    '3': 'Grade 3',
    '4': 'Grade 4',
    '5': 'Grade 5',
    '6': 'Grade 6'
  };
  
  // Update title
  document.getElementById('gradeTitle').textContent = `Grammar - ${gradeNames[grade] || 'Grade ' + grade}`;
  
  // Generate grammar cards
  const grammarGrid = document.getElementById('grammarGrid');
  grammarTopics.forEach(topic => {
    const card = document.createElement('div');
    card.className = 'grammar-card';
    card.innerHTML = `
      <a href="${topic.id}/">${topic.icon} ${topic.name.replace(/^[📘📗📙📕📓📔]\s/, '')}</a>
    `;
    grammarGrid.appendChild(card);
  });
});
</script>
</body>
</html>
